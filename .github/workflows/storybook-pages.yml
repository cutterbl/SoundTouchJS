name: Deploy Storybook to GitHub Pages

on:
  push:
    branches: [master]
    # Only run if this is a release commit
    # (release job uses 'chore(release)' prefix)
    # This ensures we only deploy after a successful release
    # and not on every push to master
    paths-ignore:
      - '**.md'
      - '**.yml'
      - '**.yaml'
      - '**.json'

jobs:
  build-and-deploy:
    if: startsWith(github.event.head_commit.message, 'chore(release)')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - run: pnpm install --frozen-lockfile
        env:
          HUSKY: 0

      - name: Build Storybook static site
        run: pnpm nx run @soundtouchjs/storybook:build-storybook

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./static-storybook
          publish_branch: gh-pages
          force_orphan: true
