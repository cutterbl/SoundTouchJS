name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - run: pnpm install --frozen-lockfile
        env:
          HUSKY: 0

      - run: pnpm typecheck

      - run: pnpm build

      - run: pnpm test

  release:
    if: github.event_name == 'push' && !startsWith(github.event.head_commit.message, 'chore(release)')
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10.11.0
          run_install: false

      - name: Setup git creds
        env:
          config_email: ${{ secrets.GIT_CONFIG_EMAIL }}
          config_un: ${{ secrets.GIT_CONFIG_USERNAME }}
        run: |
          git config --local user.email ${config_email}
          git config --local user.name ${config_un}

      - run: pnpm install --frozen-lockfile
        env:
          HUSKY: 0

      - uses: nrwl/nx-set-shas@v4

      - run: pnpm build

      - name: Set up .npmrc for publishing
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        run: pnpm exec nx release --yes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
